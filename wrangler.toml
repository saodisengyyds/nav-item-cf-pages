name = "nav-item-cf"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "web/dist"

# 注意：不要在公共仓库里写死 D1 database_id。
# 使用 Cloudflare Pages Git 部署时，请在 Pages 后台绑定：
# Settings -> Functions -> D1 database bindings
# Binding name: DB
# D1 database: 你自己账号里的 nav-item-db
#
# 如果你要用 Wrangler 直接部署，也可以复制下面示例，填入你自己的 database_id：
# [[d1_databases]]
# binding = "DB"
# database_name = "nav-item-db"
# database_id = "your-own-d1-database-id"
